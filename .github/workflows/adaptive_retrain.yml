name: Adaptive Retrain — On-Demand

on:
  # Triggered via GitHub API (repository_dispatch)
  # curl -X POST https://api.github.com/repos/{owner}/{repo}/dispatches \
  #   -H "Authorization: token $GH_TOKEN" \
  #   -d '{"event_type": "emergency_retrain", "client_payload": {"trigger": "ihsg_move"}}'
  repository_dispatch:
    types: [emergency_retrain]

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual retrain'
        required: false
        default: 'Manual trigger from GitHub UI'
      force:
        description: 'Force retrain even if cooldown active?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:

  # ─────────────────────────────────────────
  # JOB 1: VALIDATE — should we really retrain?
  # ─────────────────────────────────────────
  validate:
    name: 🔍 Validate Retrain Condition
    runs-on: ubuntu-latest
    outputs:
      should_retrain: ${{ steps.check.outputs.should_retrain }}
      trigger:        ${{ steps.check.outputs.trigger }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Evaluate retrain conditions
        id: check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Emergency dispatch or force → always retrain
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "should_retrain=true" >> $GITHUB_OUTPUT
            echo "trigger=${{ github.event.client_payload.trigger }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "should_retrain=true" >> $GITHUB_OUTPUT
            echo "trigger=force_manual" >> $GITHUB_OUTPUT
            exit 0
          fi

          python -c "
          import json, os
          from app.services.retrain_trigger import should_retrain
          result = should_retrain()
          print(json.dumps(result, indent=2, default=str))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'should_retrain={str(result[\"should\"]).lower()}\n')
              f.write(f'trigger={result[\"trigger\"]}\n')
          "

  # ─────────────────────────────────────────
  # JOB 2: INGEST — fresh data before training
  # ─────────────────────────────────────────
  ingest:
    name: 📥 Fresh Data Ingestion
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_retrain == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.services.ingestion

  # ─────────────────────────────────────────
  # JOB 3: TRAIN — retrain the model
  # ─────────────────────────────────────────
  train:
    name: 🤖 Retrain XGBoost Model
    runs-on: ubuntu-latest
    needs: [validate, ingest]
    if: needs.validate.outputs.should_retrain == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Train model
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          MLFLOW_TRACKING_URI: mlruns
          RETRAIN_TRIGGER:     ${{ needs.validate.outputs.trigger }}
        run: |
          python -c "
          import os
          from app.services.trainer import train_model
          from app.services.retrain_trigger import record_retrain

          trigger = os.environ.get('RETRAIN_TRIGGER', 'adaptive')
          result  = train_model()
          print(f'Status    : {result[\"status\"]}')
          print(f'Train acc : {result[\"train_accuracy\"]}')
          print(f'Test acc  : {result[\"test_accuracy\"]}')
          print(f'Gap       : {result[\"overfit_gap\"]}')

          if result['status'] == 'success':
              record_retrain(
                  accuracy=result['test_accuracy'],
                  trigger=trigger
              )
              print(f'State saved. Trigger: {trigger}')
          else:
              exit(1)
          "

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-adaptive-${{ github.run_id }}
          path: mlruns/saved_models/
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: VERIFY — quick sanity check
  # ─────────────────────────────────────────
  verify:
    name: ✅ Verify New Model
    runs-on: ubuntu-latest
    needs: train
    if: needs.train.result == 'success'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Download model
        uses: actions/download-artifact@v4
        with:
          name: model-adaptive-${{ github.run_id }}
          path: mlruns/saved_models/

      - name: Quick predict test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          from app.services.predictor import reload_model, predict_ticker
          reload_model()
          result = predict_ticker('BBCA.JK')
          close  = result['features']['close_price']
          signal = result['signal']
          conf   = result['confidence_pct']
          print(f'Predict OK: BBCA.JK -> {signal} ({conf}) | close=Rp {close:,.0f}')
          assert close > 0, 'close_price is 0 — ghost row not filtered!'
          assert signal in ['BUY','HOLD','SELL'], f'Invalid signal: {signal}'
          print('All assertions passed.')
          "

  # ─────────────────────────────────────────
  # JOB 5: NOTIFY — Telegram notification
  # ─────────────────────────────────────────
  notify:
    name: 📱 Telegram Notification
    runs-on: ubuntu-latest
    needs: [validate, train, verify]
    if: always()

    steps:
      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Telegram not configured, skipping."
            exit 0
          fi
          python3 -c "
          import os, requests
          token    = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id  = os.environ['TELEGRAM_CHAT_ID']
          trigger  = '${{ needs.validate.outputs.trigger }}'
          train_ok = '${{ needs.train.result }}'
          verify_ok= '${{ needs.verify.result }}'
          run_id   = '${{ github.run_id }}'

          if train_ok == 'success' and verify_ok == 'success':
              emoji = '✅'
              status = 'SUCCESS'
          elif train_ok == 'skipped':
              emoji = '⏸️'
              status = 'SKIPPED — conditions not met'
          else:
              emoji = '❌'
              status = 'FAILED'

          msg = (
              f'{emoji} *Adaptive Retrain — {status}*\n\n'
              f'🔁 Trigger: \`{trigger}\`\n'
              f'🤖 Training: \`{train_ok}\`\n'
              f'✅ Verify: \`{verify_ok}\`\n'
              f'🔢 Run ID: \`{run_id}\`'
          )

          requests.post(
              f'https://api.telegram.org/bot{token}/sendMessage',
              json={'chat_id': chat_id, 'text': msg, 'parse_mode': 'Markdown'},
              timeout=10
          )
          "

  # ─────────────────────────────────────────
  # JOB 6: SKIP LOG — if no retrain needed
  # ─────────────────────────────────────────
  skip-log:
    name: ⏸️ Log Skip Reason
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_retrain == 'false'

    steps:
      - name: Log reason
        run: |
          echo "Retrain skipped."
          echo "Trigger: ${{ needs.validate.outputs.trigger }}"