name: Daily Stock Ingestion

on:
  schedule:
    # Berjalan setiap hari Senin-Jumat jam 09:15 UTC (sekitar 16:15 WIB)
    - cron: '15 9 * * 1-5'
  workflow_dispatch: # Agar bisa kita klik "Run" manual untuk tes

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.services.ingestion